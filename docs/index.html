<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>聚沙攒钱 文档</title>
  <style>
    :root {
      color-scheme: light;
      --text: #0f172a;
      --sub: #475569;
      --line: #e2e8f0;
      --bg: #ffffff;
      --card: #f8fafc;
      --accent: #0ea5e9;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.6;
    }
    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 32px 20px 64px;
    }
    h1 { font-size: 26px; margin: 0 0 8px; }
    p { margin: 8px 0; color: var(--sub); }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px 16px;
      margin-top: 16px;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <h1>聚沙攒钱 文档</h1>
    <p>请根据需要访问以下页面：</p>

    <div class="card">
      <p><a href="privacy.html">隐私政策 / Privacy Policy</a></p>
      <p><a href="terms.html">用户协议 / Terms of Service</a></p>
      <p><a href="support.html">支持与帮助 / Support</a></p>
    </div>
  </div>
</body>
</html>
